<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Global News Lens</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #1a1814;
  --ink-mid:    #4a4540;
  --ink-muted:  #8a8278;
  --paper:      #f5f2ec;
  --paper-warm: #ede9e1;
  --paper-mid:  #ddd8ce;
  --rule:       #c8c2b8;
  --gray-country: #7a9aaa;
  --detail-bg:  #faf8f3;
  --header-h:   46px;
  --legend-h:   36px;
  --peek-h:     130px;   /* drawer collapsed peek height */
  --serif:  'Source Serif 4', Georgia, serif;
  --display: 'Playfair Display', Georgia, serif;
  --mono:   'IBM Plex Mono', monospace;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 15px;
  touch-action: manipulation;
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--ink); color: var(--paper);
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
  z-index: 1000; flex-shrink: 0;
}
#header-title { font-family: var(--display); font-size: 15px; font-weight: 700; white-space: nowrap; }
#header-divider { width: 1px; height: 16px; background: #555; }
#header-date { font-family: var(--mono); font-size: 11px; color: #aaa; }
#header-count { font-family: var(--mono); font-size: 11px; color: #777; margin-left: auto; }
#date-selector-wrap { display: none; align-items: center; gap: 6px; }
#date-selector-wrap label { font-family: var(--mono); font-size: 9px; color: #888; text-transform: uppercase; }
#date-selector { font-family: var(--mono); font-size: 10px; background: #2a2824; color: #ddd; border: 1px solid #444; border-radius: 2px; padding: 2px 5px; }

/* ── LEGEND STRIP ── */
#legend-strip {
  position: fixed;
  top: var(--header-h); left: 0; right: 0;
  height: var(--legend-h);
  background: rgba(245,242,236,0.96);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 10px; gap: 0;
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  z-index: 900;
  white-space: nowrap;
}
#legend-strip::-webkit-scrollbar { display: none; }
.ls-item {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 0 10px 0 0; flex-shrink: 0;
  cursor: pointer; opacity: 0.85;
}
.ls-item:active { opacity: 1; }
.ls-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.ls-label { font-family: var(--mono); font-size: 10px; color: var(--ink-mid); }
.ls-no-data { cursor: default; }

/* ── MAP ── */
#map-wrap {
  position: fixed;
  top: calc(var(--header-h) + var(--legend-h));
  left: 0; right: 0;
  bottom: var(--peek-h);
  z-index: 100;
}
#map { width: 100%; height: 100%; background: #c8dce8; }

/* ── TOOLTIP ── */
#map-tooltip {
  position: fixed; background: var(--ink); color: var(--paper);
  padding: 7px 10px; font-family: var(--mono); font-size: 11px;
  line-height: 1.5; pointer-events: none; opacity: 0;
  transition: opacity 0.1s; z-index: 2000;
  max-width: 220px; border-left: 3px solid transparent;
}
#map-tooltip.visible { opacity: 1; }

/* ── DRAWER ── */
#drawer {
  position: fixed; left: 0; right: 0; bottom: 0;
  height: 92vh;                          /* max expanded height */
  background: var(--detail-bg);
  border-top: 1px solid var(--rule);
  border-radius: 14px 14px 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
  z-index: 500;
  display: flex; flex-direction: column;
  transform: translateY(calc(92vh - var(--peek-h)));
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  will-change: transform;
}
#drawer.expanded {
  transform: translateY(calc(92vh - 60vh));
}
#drawer.fully-expanded {
  transform: translateY(0);
}

/* Handle */
#drawer-handle {
  flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; padding: 10px 0 6px;
  cursor: grab; user-select: none; touch-action: none;
}
#drawer-handle:active { cursor: grabbing; }
#handle-bar {
  width: 36px; height: 4px;
  background: var(--paper-mid); border-radius: 2px;
}

/* Drawer content */
#drawer-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 4px 18px 32px;
  scrollbar-width: thin;
  scrollbar-color: var(--rule) transparent;
  -webkit-overflow-scrolling: touch;
}
#drawer-content::-webkit-scrollbar { width: 3px; }
#drawer-content::-webkit-scrollbar-thumb { background: var(--rule); }

/* ── WELCOME (peek state) ── */
#welcome-peek {
  display: flex; flex-direction: column; gap: 4px;
}
#wp-title { font-family: var(--display); font-size: 16px; font-weight: 700; }
#wp-date { font-family: var(--mono); font-size: 10px; color: var(--ink-muted); }
#wp-count { font-family: var(--mono); font-size: 11px; color: var(--ink-mid); }
#wp-instruction { font-size: 12px; color: var(--ink-muted); font-style: italic; line-height: 1.5; margin-top: 2px; }

/* ── COUNTRY DETAIL ── */
#country-flag-name { display: flex; align-items: baseline; gap: 10px; margin-bottom: 5px; }
#country-flag { font-size: 28px; line-height: 1; }
#country-name { font-family: var(--display); font-size: 22px; font-weight: 700; line-height: 1.1; }
#country-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); display: flex; gap: 14px; margin-top: 6px; flex-wrap: wrap; }
.country-meta-item span { color: var(--ink); font-weight: 500; }

.detail-section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 10px; margin-top: 18px; }

/* Genre pills */
#genre-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
.genre-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px 7px 9px;
  border: 1.5px solid currentColor; border-radius: 2px;
  cursor: pointer; font-family: var(--mono); font-size: 11px;
  transition: background 0.15s, color 0.15s;
  color: var(--ink-mid); background: transparent;
}
.genre-pill::before { content: ''; display: block; width: 9px; height: 9px; border-radius: 50%; background: var(--pill-color); flex-shrink: 0; }
.genre-pill.active { background: var(--pill-color); border-color: var(--pill-color); color: white; }
.genre-pill.active::before { background: white; }

/* Subtopic list */
#subtopic-list { display: flex; flex-direction: column; }
.subtopic-row { border-top: 1px solid var(--rule); }
.subtopic-row:last-child { border-bottom: 1px solid var(--rule); }
.subtopic-header { display: flex; justify-content: space-between; align-items: baseline; padding: 11px 3px; gap: 10px; cursor: pointer; }
.subtopic-label { font-size: 14px; color: var(--ink); line-height: 1.35; }
.subtopic-pct { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); white-space: nowrap; flex-shrink: 0; }
.expand-icon { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); margin-left: 5px; transition: transform 0.15s; display: inline-block; }
.subtopic-row.expanded .expand-icon { transform: rotate(90deg); }
.subtopic-articles { display: none; padding: 0 3px 14px; flex-direction: column; gap: 10px; }
.subtopic-articles.open { display: flex; }
.article-link { display: block; font-size: 13px; color: var(--ink); text-decoration: none; line-height: 1.5; border-bottom: 1px solid transparent; }
.article-link:active { border-bottom-color: var(--ink-mid); }
.article-source { font-family: var(--mono); font-size: 10px; color: var(--ink-muted); margin-top: 2px; letter-spacing: 0.04em; }

/* Genre overview (from legend tap) */
#genre-detail-label { font-family: var(--display); font-size: 20px; font-weight: 700; margin-bottom: 4px; }
#genre-global-pct { font-family: var(--mono); font-size: 12px; color: var(--ink-muted); margin-bottom: 2px; }
.country-list { display: flex; flex-direction: column; }
.country-list-row { display: flex; align-items: center; gap: 9px; padding: 9px 4px; border-top: 1px solid var(--rule); cursor: pointer; }
.country-list-row:last-child { border-bottom: 1px solid var(--rule); }
.cl-flag { font-size: 17px; flex-shrink: 0; }
.cl-name { font-size: 14px; flex: 1; }
.cl-pct { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); white-space: nowrap; }
.cl-bar { width: 40px; height: 3px; background: var(--rule); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.cl-bar-fill { height: 100%; border-radius: 2px; }

.h-rule { height: 1px; background: var(--rule); margin: 14px 0; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-title">Global News Lens</div>
  <div id="header-divider"></div>
  <div id="header-date">—</div>
  <div id="header-count">—</div>
  <div id="date-selector-wrap">
    <label>Date</label>
    <select id="date-selector"></select>
  </div>
</div>

<!-- LEGEND STRIP -->
<div id="legend-strip"></div>

<!-- MAP -->
<div id="map-wrap"><div id="map"></div></div>

<!-- TOOLTIP -->
<div id="map-tooltip">
  <div id="tt-country"></div>
  <div id="tt-genre"></div>
  <div id="tt-count"></div>
</div>

<!-- DRAWER -->
<div id="drawer">
  <div id="drawer-handle"><div id="handle-bar"></div></div>
  <div id="drawer-content"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   CONFIG & PALETTE
══════════════════════════════════════════════ */
const MANIFEST_PATH = './available_dates.json';

const GENRE_PALETTE = {
  0:'#4e79a7',1:'#b07d62',2:'#59a14f',3:'#c94040',
  4:'#7b6da8',5:'#d4a03a',6:'#3aabab',7:'#c4773b',
  8:'#8fa832',9:'#c46ba8',10:'#2e6fbf',11:'#bf5050',
  12:'#4aad86',13:'#7a6e3e',14:'#5a82a8',15:'#c8893a',
  16:'#5aab5a',17:'#ab6b8a',18:'#3a8a8a',19:'#a87a4a',
};
const GRAY_COUNTRY = '#7a9aaa';
function genreColor(pid) { return (pid == null) ? GRAY_COUNTRY : (GENRE_PALETTE[+pid] ?? GRAY_COUNTRY); }

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let DATA = null;
let ALL_PAYLOADS = {};
let genreCountryIndex = null;
let selectedCountryId = null;
let countryLayers = {};
let map = null;

/* ══════════════════════════════════════════════
   UTILITY
══════════════════════════════════════════════ */
function fmtPct(v)  { return (v * 100).toFixed(1) + '%'; }
function fmtNum(v)  { return v?.toLocaleString() ?? '—'; }
function fmtDate(s) {
  s = String(s);
  if (s.length < 8) return s;
  const dt = new Date(`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`);
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
}

const ALPHA3_TO_2 = {"AFG":"AF","ALB":"AL","DZA":"DZ","AND":"AD","AGO":"AO","ATG":"AG","ARG":"AR","ARM":"AM","AUS":"AU","AUT":"AT","AZE":"AZ","BHS":"BS","BHR":"BH","BGD":"BD","BRB":"BB","BLR":"BY","BEL":"BE","BLZ":"BZ","BEN":"BJ","BTN":"BT","BOL":"BO","BIH":"BA","BWA":"BW","BRA":"BR","BRN":"BN","BGR":"BG","BFA":"BF","BDI":"BI","CPV":"CV","KHM":"KH","CMR":"CM","CAN":"CA","CAF":"CF","TCD":"TD","CHL":"CL","CHN":"CN","COL":"CO","COM":"KM","COD":"CD","COG":"CG","CRI":"CR","CIV":"CI","HRV":"HR","CUB":"CU","CYP":"CY","CZE":"CZ","DNK":"DK","DJI":"DJ","DOM":"DO","ECU":"EC","EGY":"EG","SLV":"SV","GNQ":"GQ","ERI":"ER","EST":"EE","SWZ":"SZ","ETH":"ET","FJI":"FJ","FIN":"FI","FRA":"FR","GAB":"GA","GMB":"GM","GEO":"GE","DEU":"DE","GHA":"GH","GRC":"GR","GRD":"GD","GTM":"GT","GIN":"GN","GNB":"GW","GUY":"GY","HTI":"HT","HND":"HN","HUN":"HU","ISL":"IS","IND":"IN","IDN":"ID","IRN":"IR","IRQ":"IQ","IRL":"IE","ISR":"IL","ITA":"IT","JAM":"JM","JPN":"JP","JOR":"JO","KAZ":"KZ","KEN":"KE","KIR":"KI","PRK":"KP","KOR":"KR","KWT":"KW","KGZ":"KG","LAO":"LA","LVA":"LV","LBN":"LB","LSO":"LS","LBR":"LR","LBY":"LY","LIE":"LI","LTU":"LT","LUX":"LU","MDG":"MG","MWI":"MW","MYS":"MY","MDV":"MV","MLI":"ML","MLT":"MT","MHL":"MH","MRT":"MR","MUS":"MU","MEX":"MX","FSM":"FM","MDA":"MD","MCO":"MC","MNG":"MN","MNE":"ME","MAR":"MA","MOZ":"MZ","MMR":"MM","NAM":"NA","NRU":"NR","NPL":"NP","NLD":"NL","NZL":"NZ","NIC":"NI","NER":"NE","NGA":"NG","MKD":"MK","NOR":"NO","OMN":"OM","PAK":"PK","PLW":"PW","PAN":"PA","PNG":"PG","PRY":"PY","PER":"PE","PHL":"PH","POL":"PL","PRT":"PT","QAT":"QA","ROU":"RO","RUS":"RU","RWA":"RW","KNA":"KN","LCA":"LC","VCT":"VC","WSM":"WS","SMR":"SM","STP":"ST","SAU":"SA","SEN":"SN","SRB":"RS","SLE":"SL","SGP":"SG","SVK":"SK","SVN":"SI","SLB":"SB","SOM":"SO","ZAF":"ZA","SSD":"SS","ESP":"ES","LKA":"LK","SDN":"SD","SUR":"SR","SWE":"SE","CHE":"CH","SYR":"SY","TWN":"TW","TJK":"TJ","TZA":"TZ","THA":"TH","TLS":"TL","TGO":"TG","TON":"TO","TTO":"TT","TUN":"TN","TUR":"TR","TKM":"TM","TUV":"TV","UGA":"UG","UKR":"UA","ARE":"AE","GBR":"GB","USA":"US","URY":"UY","UZB":"UZ","VUT":"VU","VEN":"VE","VNM":"VN","YEM":"YE","ZMB":"ZM","ZWE":"ZW","PSE":"PS","XKX":"XK","KOS":"XK"};

function flagEmoji(c) { return [...c.toUpperCase()].map(ch => String.fromCodePoint(0x1F1E6-65+ch.charCodeAt(0))).join(''); }
function getFlag(a3) { const a2 = ALPHA3_TO_2[(a3||'').toUpperCase()]; return a2 ? flagEmoji(a2) : '🌐'; }

function buildGenreCountryIndex() {
  const idx = {};
  DATA.geojson.features.forEach(f => {
    (f.properties.genres || []).forEach(g => {
      const pid = String(g.parent_topic_id);
      if (!idx[pid]) idx[pid] = [];
      idx[pid].push({ featureId: f.id, name: f.properties.name || f.id, flag: getFlag(f.id), genre_pct: g.genre_pct, genre_article_count: g.genre_article_count });
    });
  });
  Object.values(idx).forEach(arr => arr.sort((a,b) => b.genre_pct - a.genre_pct));
  return idx;
}

/* ══════════════════════════════════════════════
   DRAWER
══════════════════════════════════════════════ */
const drawer = document.getElementById('drawer');
const drawerContent = document.getElementById('drawer-content');
const handle = document.getElementById('drawer-handle');

let drawerState = 'peek'; // 'peek' | 'expanded'
let dragStartY = 0, dragStartTranslate = 0, isDragging = false;

function getPeekTranslate() { return drawer.offsetHeight - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--peek-h')); }
function getExpandedTranslate() { return drawer.offsetHeight * 0.4; } // 60vh visible

function setDrawerState(state, animated = true) {
  drawerState = state;
  if (!animated) drawer.style.transition = 'none';
  if (state === 'peek') {
    drawer.style.transform = `translateY(${getPeekTranslate()}px)`;
  } else {
    drawer.style.transform = `translateY(${getExpandedTranslate()}px)`;
  }
  if (!animated) requestAnimationFrame(() => { drawer.style.transition = ''; });
}

// Touch drag on handle
handle.addEventListener('touchstart', e => {
  isDragging = true;
  dragStartY = e.touches[0].clientY;
  const matrix = new DOMMatrix(getComputedStyle(drawer).transform);
  dragStartTranslate = matrix.m42;
  drawer.style.transition = 'none';
}, { passive: true });

handle.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dy = e.touches[0].clientY - dragStartY;
  const newY = Math.max(0, Math.min(getPeekTranslate(), dragStartTranslate + dy));
  drawer.style.transform = `translateY(${newY}px)`;
}, { passive: true });

handle.addEventListener('touchend', e => {
  if (!isDragging) return;
  isDragging = false;
  drawer.style.transition = '';
  const matrix = new DOMMatrix(getComputedStyle(drawer).transform);
  const currentY = matrix.m42;
  const threshold = (getPeekTranslate() + getExpandedTranslate()) / 2;
  setDrawerState(currentY > threshold ? 'peek' : 'expanded');
});

// Also allow tapping handle to toggle
handle.addEventListener('click', () => {
  setDrawerState(drawerState === 'peek' ? 'expanded' : 'peek');
});

/* ══════════════════════════════════════════════
   DETAIL PANEL RENDERING
══════════════════════════════════════════════ */
function renderWelcome() {
  drawerContent.innerHTML = `
    <div id="welcome-peek">
      <div id="wp-title">Global News Lens</div>
      <div id="wp-date">${fmtDate(DATA.date)}</div>
      <div id="wp-count">${fmtNum(DATA.total_articles)} articles indexed</div>
      <div id="wp-instruction">Tap any country to explore its news coverage. Tap a genre in the legend strip to see which countries cover it.</div>
    </div>`;
  setDrawerState('peek');
}

function renderCountryDetail(featureId, preselectGenreId) {
  const feature = DATA.geojson.features.find(f => f.id === featureId);
  if (!feature) return;
  const props = feature.properties;
  const genres = props.genres || [];
  if (!genres.length) {
    drawerContent.innerHTML = `<div style="padding:12px 0;color:var(--ink-muted);font-style:italic;font-size:14px;">No genre data for this country.</div>`;
    setDrawerState('expanded');
    return;
  }
  const defaultIdx = preselectGenreId != null
    ? Math.max(0, genres.findIndex(g => String(g.parent_topic_id) === String(preselectGenreId)))
    : 0;

  drawerContent.innerHTML = `
    <div id="country-header" style="margin-bottom:16px">
      <div id="country-flag-name">
        <span id="country-flag">${getFlag(featureId)}</span>
        <span id="country-name">${props.name || featureId}</span>
      </div>
      <div id="country-meta">
        <div class="country-meta-item"><span>${fmtNum(props.country_total_articles)}</span> articles</div>
        <div class="country-meta-item">${fmtDate(DATA.date)}</div>
      </div>
    </div>
    <div class="detail-section-label">News Genres</div>
    <div id="genre-pills"></div>
    <div id="subtopic-list"></div>`;

  const pillsEl = document.getElementById('genre-pills');
  genres.forEach((g, i) => {
    const color = genreColor(g.parent_topic_id);
    const active = i === defaultIdx;
    const pill = document.createElement('div');
    pill.className = 'genre-pill' + (active ? ' active' : '');
    pill.style.setProperty('--pill-color', color);
    pill.style.borderColor = color;
    pill.style.color = active ? 'white' : color;
    pill.style.background = active ? color : 'transparent';
    pill.innerHTML = `${g.genre_label} <span style="opacity:0.8">· ${fmtPct(g.genre_pct)}</span>`;
    pill.addEventListener('click', () => selectGenrePill(genres, i));
    pillsEl.appendChild(pill);
  });

  renderSubtopics(genres[defaultIdx]);
  setDrawerState('expanded');
}

function selectGenrePill(genres, idx) {
  document.querySelectorAll('.genre-pill').forEach((p, i) => {
    const color = genreColor(genres[i].parent_topic_id);
    const active = i === idx;
    p.classList.toggle('active', active);
    p.style.borderColor = color;
    p.style.color = active ? 'white' : color;
    p.style.background = active ? color : 'transparent';
  });
  renderSubtopics(genres[idx]);
}

function renderSubtopics(genre) {
  const el = document.getElementById('subtopic-list');
  if (!el) return;
  el.innerHTML = '';
  (genre.subtopics || []).forEach(st => {
    const row = document.createElement('div');
    row.className = 'subtopic-row';
    row.innerHTML = `
      <div class="subtopic-header">
        <span class="subtopic-label">${st.local_label}<span class="expand-icon">›</span></span>
        <span class="subtopic-pct">${fmtPct(st.subtopic_pct)}</span>
      </div>
      <div class="subtopic-articles"></div>`;
    const header = row.querySelector('.subtopic-header');
    const articlesEl = row.querySelector('.subtopic-articles');
    header.addEventListener('click', () => {
      const isOpen = row.classList.contains('expanded');
      document.querySelectorAll('.subtopic-row.expanded').forEach(r => {
        r.classList.remove('expanded');
        r.querySelector('.subtopic-articles').classList.remove('open');
      });
      if (!isOpen) {
        row.classList.add('expanded');
        articlesEl.classList.add('open');
        if (!articlesEl.dataset.rendered) {
          articlesEl.dataset.rendered = '1';
          (st.articles || []).forEach(a => {
            const item = document.createElement('div');
            item.innerHTML = `<a class="article-link" href="${a.url}" target="_blank" rel="noopener">${a.title}</a><div class="article-source">${a.source}</div>`;
            articlesEl.appendChild(item);
          });
        }
      }
    });
    el.appendChild(row);
  });
}

function renderGenreDetail(parentId) {
  const pid = String(parentId);
  const genre = DATA.parent_topics[pid];
  if (!genre) return;
  if (!genreCountryIndex) genreCountryIndex = buildGenreCountryIndex();
  const color = genreColor(parentId);
  const countries = genreCountryIndex[pid] || [];
  const globalPct = genre.genre_global_pct ?? null;

  drawerContent.innerHTML = `
    <div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--ink-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;">Genre Overview</div>
      <div id="genre-detail-label" style="color:${color}">${genre.genre_label}</div>
      ${globalPct != null ? `<div id="genre-global-pct">${fmtPct(globalPct)} of global coverage</div>` : ''}
    </div>
    <div class="h-rule"></div>
    <div class="detail-section-label">Countries Covering This Genre</div>
    ${!countries.length ? '<div style="color:var(--ink-muted);font-size:13px;font-style:italic;padding:6px 0;">No countries found for this date.</div>' : ''}
    <div class="country-list" id="genre-country-list"></div>`;

  const listEl = document.getElementById('genre-country-list');
  countries.forEach(c => {
    const row = document.createElement('div');
    row.className = 'country-list-row';
    row.innerHTML = `
      <span class="cl-flag">${c.flag}</span>
      <span class="cl-name">${c.name}</span>
      <div class="cl-bar"><div class="cl-bar-fill" style="width:${Math.min(100,Math.round(c.genre_pct*100))}%;background:${color}"></div></div>
      <span class="cl-pct">${fmtPct(c.genre_pct)}</span>`;
    row.addEventListener('click', () => {
      highlightCountry(c.featureId);
      renderCountryDetail(c.featureId, parentId);
    });
    listEl.appendChild(row);
  });
  setDrawerState('expanded');
}

/* ══════════════════════════════════════════════
   MAP
══════════════════════════════════════════════ */
function initMap() {
  if (map) { map.remove(); map = null; countryLayers = {}; selectedCountryId = null; }
  map = L.map('map', { center: [20, 10], zoom: 2, minZoom: 1, maxZoom: 6, zoomControl: false, attributionControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19,
  }).addTo(map);
  L.geoJSON(DATA.geojson, { style: styleFeature, onEachFeature: bindFeatureEvents }).addTo(map);
}

function styleFeature(feature) {
  const pid = feature.properties?.dominant_parent_topic_id;
  const hasGenres = (feature.properties?.genres?.length ?? 0) > 0;
  const color = hasGenres ? genreColor(pid) : GRAY_COUNTRY;
  return { fillColor: color, fillOpacity: 0.78, color: feature.id === selectedCountryId ? '#1a1814' : '#f5f2ec', weight: feature.id === selectedCountryId ? 2 : 0.4, opacity: 1 };
}

function bindFeatureEvents(feature, layer) {
  countryLayers[feature.id] = layer;
  layer.on({ click: e => { highlightCountry(e.target.feature.id); renderCountryDetail(e.target.feature.id, null); } });
}

function highlightCountry(fid) {
  if (selectedCountryId && countryLayers[selectedCountryId]) countryLayers[selectedCountryId].setStyle({ color: '#f5f2ec', weight: 0.4 });
  selectedCountryId = fid;
  if (fid && countryLayers[fid]) { countryLayers[fid].setStyle({ color: '#1a1814', weight: 2 }); countryLayers[fid].bringToFront(); }
}

/* ── Tooltip (tap) ── */
const tooltip = document.getElementById('map-tooltip');
document.addEventListener('touchend', () => { tooltip.style.opacity = '0'; }, { passive: true });

/* ══════════════════════════════════════════════
   LEGEND STRIP
══════════════════════════════════════════════ */
function buildLegend() {
  const strip = document.getElementById('legend-strip');
  strip.innerHTML = '';
  if (!genreCountryIndex) genreCountryIndex = buildGenreCountryIndex();
  Object.keys(DATA.parent_topics).sort((a,b) => +a - +b).forEach(pid => {
    if (!(genreCountryIndex[pid]?.length)) return;
    const g = DATA.parent_topics[pid];
    const color = genreColor(+pid);
    const item = document.createElement('div');
    item.className = 'ls-item';
    item.innerHTML = `<div class="ls-dot" style="background:${color}"></div><span class="ls-label">${g.genre_label}</span>`;
    item.addEventListener('click', () => renderGenreDetail(+pid));
    strip.appendChild(item);
  });
  // No-data entry
  const gray = document.createElement('div');
  gray.className = 'ls-item ls-no-data';
  gray.innerHTML = `<div class="ls-dot" style="background:${GRAY_COUNTRY}"></div><span class="ls-label" style="color:var(--ink-muted)">No data</span>`;
  strip.appendChild(gray);
}

/* ══════════════════════════════════════════════
   DATE LOADING
══════════════════════════════════════════════ */
async function loadDate(dateStr) {
  if (ALL_PAYLOADS[dateStr]) { DATA = ALL_PAYLOADS[dateStr]; }
  else {
    const entry = (window._MANIFEST || []).find(e => e.date === dateStr);
    if (!entry) return;
    const resp = await fetch('./' + entry.file);
    DATA = await resp.json();
    ALL_PAYLOADS[dateStr] = DATA;
  }
  genreCountryIndex = null;
  document.getElementById('header-date').textContent = fmtDate(DATA.date);
  document.getElementById('header-count').textContent = fmtNum(DATA.total_articles) + ' articles';
  genreCountryIndex = buildGenreCountryIndex();
  initMap();
  buildLegend();
  renderWelcome();
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
async function boot() {
  let manifest = [];
  try {
    const mResp = await fetch(MANIFEST_PATH);
    if (mResp.ok) manifest = await mResp.json();
  } catch(e) {}

  if (!manifest.length) {
    try {
      const resp = await fetch('./20260512_ui_payload.json');
      DATA = await resp.json();
      manifest = [{ date: DATA.date, file: '20260512_ui_payload.json', total_articles: DATA.total_articles }];
    } catch(e) {
      drawerContent.innerHTML = `<div style="padding:16px;color:#bf5a5a;font-family:var(--mono);font-size:12px;">Could not load data. Ensure you are running via a local server.</div>`;
      return;
    }
  } else {
    try {
      const resp = await fetch('./' + manifest[0].file);
      DATA = await resp.json();
    } catch(e) {
      drawerContent.innerHTML = `<div style="padding:16px;color:#bf5a5a;font-family:var(--mono);font-size:12px;">Could not load data file: ${manifest[0].file}</div>`;
      return;
    }
  }

  ALL_PAYLOADS[DATA.date] = DATA;
  window._MANIFEST = manifest;

  if (manifest.length > 1) {
    const wrap = document.getElementById('date-selector-wrap');
    const sel = document.getElementById('date-selector');
    wrap.style.display = 'flex';
    manifest.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.date; opt.textContent = fmtDate(e.date);
      sel.appendChild(opt);
    });
    sel.value = DATA.date;
    sel.addEventListener('change', () => loadDate(sel.value));
  }

  document.getElementById('header-date').textContent = fmtDate(DATA.date);
  document.getElementById('header-count').textContent = fmtNum(DATA.total_articles) + ' articles';
  genreCountryIndex = buildGenreCountryIndex();
  initMap();
  buildLegend();
  renderWelcome();
  // Set initial drawer position after fonts/layout settle
  requestAnimationFrame(() => setDrawerState('peek', false));
}

boot();
</script>
</body>
</html>
